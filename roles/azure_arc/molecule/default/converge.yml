---
- name: Converge
  hosts: molecule
  gather_facts: true
  vars:
    azure:
      service_principal_id: "00000000-0000-0000-0000-000000000000"
      service_principal_secret: "molecule-placeholder-secret"
      tenant_id: "00000000-0000-0000-0000-000000000000"
      subscription_id: "00000000-0000-0000-0000-000000000000"
      resource_group: "molecule-rg"
      location: "eastus"
  tasks:
    - name: Include azure_arc role
      ansible.builtin.include_role:
        name: danmwallace.azure.azure_arc
